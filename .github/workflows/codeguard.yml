name: CodeGuard Analysis
on:
  push: {branches: [main]}
  pull_request: {branches: [main]}
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - uses: ./.github/actions/codeguard
        with:
          path: src/
          severity: medium
          format: terminal
